name: Update All Forecasts

on:
  schedule:
    - cron: '0 16 * * *'  # JST 01:00（UTC 16:00）
  workflow_dispatch:

concurrency:
  group: ocean-forecast
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Fetch all areas
        run: |
          mkdir -p forecast

          AREAS="03 01 02 04 05 06 07 08 S01"

          for area in $AREAS
          do
            echo "Fetching $area"
            curl -L "https://my-ocean-api.onrender.com/umishiru_forecast?areaCode=$area" \
              -o "forecast/${area}.json"
          done

      - name: Commit and Push (safe)
        run: |
          git add forecast

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update all forecasts"
          git push origin main
