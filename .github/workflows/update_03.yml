name: Update Umishiru

on:
  schedule:
    - cron: '0 15 * * *'   # JST 00:00
    - cron: '0 18 * * *'   # JST 03:00 (失敗時保険)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: umishiru-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          pip install requests
      - name: Fetch forecasts from FastAPI
        run: |
          python << 'EOF'
          import requests
          import json
          import os
          from datetime import datetime

          AREAS = [
              "01","02","03","04",
              "05","06","07","08","S01"
          ]

          os.makedirs("forecast", exist_ok=True)

          BASE_URL = "https://my-ocean-api.onrender.com"

          for area in AREAS:
              print("fetch", area)

              r = requests.get(
                  f"{BASE_URL}/umishiru_forecast",
                  params={"areaCode": area},
                  timeout=120
              )

              r.raise_for_status()

              with open(
                  f"forecast/{area}.json",
                  "w",
                  encoding="utf-8"
              ) as f:
                  json.dump(
                      r.json(),
                      f,
                      ensure_ascii=False,
                      indent=2
                  )

          with open(
              "forecast/update_status.json",
              "w",
              encoding="utf-8"
          ) as f:
              json.dump(
                  {
                      "date": datetime.now().strftime("%Y-%m-%d")
                  },
                  f
              )
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add forecast

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update forecasts"

          git pull --rebase origin main

          git push origin main
