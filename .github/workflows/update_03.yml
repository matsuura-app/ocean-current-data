name: Update Current Forecast 03

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0
  - name: Fetch data
    run: |
      mkdir -p forecast
      curl -L "https://my-ocean-api.onrender.com/umishiru_forecast?areaCode=03" \
      -o forecast/03.json
  - name: Commit and Push
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"
      git add forecast/03.json
      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "update forecast 03"
        git pull --rebase origin main
        git push origin main
      fi
